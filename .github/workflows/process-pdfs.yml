name: PDF Process and Deploy

on:
  push:
    paths:
      - 'zip_files/**'
  workflow_dispatch:

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install PyMuPDF pdfplumber

      - name: Process PDFs
        run: python scripts/pdf_extractor.py ./zip_files/ pdf_database.db
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-database
          path: pdf_database.db
          retention-days: 30

      - name: Deploy via FTP
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            set ssl:verify-certificate no;
            open -u $FTP_USER,$FTP_PASS $FTP_HOST;
            mirror -R ./web/ $FTP_DIR;
            put pdf_database.db -o ${FTP_DIR}pdf_database.db;
            bye
          "
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_SERVER_DIR }}